<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sinus Skolim</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2ff;
}

canvas{
background:white;
border:2px solid black;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#gif{
position:absolute;
width:120px;
pointer-events:none;
}

#shop{
margin-top:20px;
border-top:2px solid black;
padding-top:10px;
}

</style>

</head>
<body>

<h2>Sinus Skolim</h2>

<button id="startBtn">START</button>
<button id="pukBtn">PUK</button>

<br><br>

<canvas id="plane" width="500" height="500"></canvas>

<img id="gif" src="puk.gif">

<div id="info"></div>

<div id="shop">

<h3>Sklep</h3>

<button id="buyAuto">+1 suma / sek (1 coin)</button>

</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let map = 1;

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:'8J1stp9AbOk',
playerVars:{
controls:0,
loop:1,
playlist:'8J1stp9AbOk'
}
});

}

const canvas = document.getElementById("plane");
const ctx = canvas.getContext("2d");
const gif = document.getElementById("gif");

const centerX = 250;
const centerY = 250;
const radius = 200;

let angle = 0;

let sumSin = 0;
let rebirths = 0;
let coins = 0;
let autoGain = 0;

let started = false;

/* START */

startBtn.onclick = () => {

player.playVideo();
started = true;

};

/* MAPA */

function updateMap(){

if(rebirths >= 5 && map === 1){

map = 2;

gif.src = "skirr.gif";

player.loadVideoById("-6KuSa0zgaA");

}

}

/* GŁOŚNOŚĆ */

function updateVolume(){

let volume = sumSin;

if(volume < 0) volume = 0;
if(volume > 100) volume = 100;

if(player){
player.setVolume(volume);
}

}

/* PUK */

pukBtn.onclick = () => {

if(!started) return;

let value;

if(map === 1){
value = Math.sin(angle);
}else{
value = Math.cos(angle);
}

sumSin += value;

checkRebirth();

updateVolume();

updateInfo();

};

/* REBIRTH */

function checkRebirth(){

if(sumSin >= 100){

sumSin = 0;

rebirths++;
coins++;

updateMap();

}

}

/* SKLEP */

buyAuto.onclick = () => {

if(coins >= 1){

coins--;
autoGain++;

}

};

/* RYSOWANIE */

function draw(){

ctx.clearRect(0,0,500,500);

/* osie */

ctx.beginPath();
ctx.moveTo(0,centerY);
ctx.lineTo(500,centerY);

ctx.moveTo(centerX,0);
ctx.lineTo(centerX,500);

ctx.stroke();

/* okrąg */

ctx.beginPath();
ctx.arc(centerX,centerY,radius,0,Math.PI*2);
ctx.stroke();

/* promień */

let x = centerX + radius*Math.cos(angle);
let y = centerY - radius*Math.sin(angle);

ctx.beginPath();
ctx.moveTo(centerX,centerY);
ctx.lineTo(x,y);
ctx.stroke();

/* gif */

const rect = canvas.getBoundingClientRect();

gif.style.left = (rect.left + x - 60) + "px";
gif.style.top = (rect.top + y - 60) + "px";

}

/* INFO */

function updateInfo(){

let trig;

if(map === 1){
trig = Math.sin(angle);
}else{
trig = Math.cos(angle);
}

info.innerHTML =
"Suma: " + sumSin.toFixed(2) + "<br>" +
"Funkcja: " + trig.toFixed(3) + "<br>" +
"Rebirthy: " + rebirths + "<br>" +
"Coins: " + coins + "<br>" +
"+/sek: " + autoGain + "<br>" +
"Mapa: " + map;

}

/* ANIMACJA */

function animate(){

angle += 0.02;

if(angle > Math.PI*2){
angle = 0;
}

draw();

requestAnimationFrame(animate);

}

animate();

/* AUTO GAIN */

setInterval(()=>{

sumSin += autoGain;

checkRebirth();

updateVolume();

updateInfo();

},1000);

</script>

</body>
</html>
