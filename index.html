<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sinus Skolim Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2ff;
}

canvas{
background:white;
border:2px solid black;
}

button{
font-size:20px;
padding:10px 25px;
margin:10px;
cursor:pointer;
}

#info{
margin-top:20px;
font-size:20px;
}

#gif{
position:absolute;
width:150px;
pointer-events:none;
}

</style>

</head>
<body>

<h2>Sinus Skolim</h2>

<button id="startBtn">START</button><br>
<button id="pukBtn">PUK</button>

<canvas id="plane" width="500" height="500"></canvas>

<img id="gif" src="puk.gif">

<div id="info">
Rebirthy: 0
</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let map=1;

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'0',
width:'0',
videoId:'8J1stp9AbOk',
playerVars:{
controls:0,
loop:1,
playlist:'8J1stp9AbOk'
}
});

}

const canvas=document.getElementById("plane");
const ctx=canvas.getContext("2d");
const gif=document.getElementById("gif");

const centerX=250;
const centerY=250;
const radius=200;

let angle=0;
let sumSin=0;
let rebirths=0;
let started=false;

function updateMap(){

if(rebirths>=10 && map===1){

map=2;

gif.src="skirr.gif";

player.loadVideoById("-6KuSa0zgaA");

}

}

function updateVolume(){

let volume=sumSin;

if(volume<0) volume=0;
if(volume>100) volume=100;

player.setVolume(volume);

}

startBtn.onclick=()=>{

player.playVideo();
started=true;

};

pukBtn.onclick=()=>{

if(!started) return;

let value;

if(map===1){
value=Math.sin(angle);
}else{
value=Math.cos(angle);
}

let multiplier=1+(rebirths/10);

sumSin+=value*multiplier;

if(sumSin>=100){

sumSin=0;
rebirths++;

updateMap();

}

updateVolume();

info.innerHTML=
"Rebirthy: "+rebirths+"<br>"+
"Mapa: "+map;

};

function draw(){

ctx.clearRect(0,0,500,500);

ctx.beginPath();
ctx.arc(centerX,centerY,radius,0,Math.PI*2);
ctx.stroke();

let x=centerX+radius*Math.cos(angle);
let y=centerY-radius*Math.sin(angle);

ctx.beginPath();
ctx.moveTo(centerX,centerY);
ctx.lineTo(x,y);
ctx.stroke();

const rect=canvas.getBoundingClientRect();

gif.style.left=(rect.left+x-75)+"px";
gif.style.top=(rect.top+y-75)+"px";

}

function animate(){

angle+=0.02;

if(angle>Math.PI*2){
angle=0;
}

draw();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
