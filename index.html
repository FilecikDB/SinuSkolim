<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Trig Game</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
text-align:center;
}

#layout{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

canvas{
background:white;
border:2px solid black;
}

#rightPanel{
font-size:20px;
line-height:30px;
text-align:left;
width:250px;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#gif{
position:absolute;
width:120px;
pointer-events:none;
}

.progressBox{
width:220px;
height:20px;
border:2px solid black;
margin-top:10px;
}

.progressBar{
height:100%;
width:0%;
background:limegreen;
}

</style>
</head>
<body>

<h2>Trig Game</h2>

<div id="gameUI">
<button id="startBtn">START</button>
<button id="adminBtn" style="display:none">ADMIN</button>
<br>
<button id="pukBtn">PUK</button>
<button id="buyBoost">Kup +1 / obrót (1 coin)</button>
</div>

<div id="adminUI" style="display:none">
<h3>TRYB ADMIN</h3>
<button id="addRebirth">+1 Rebirth</button>
<button id="removeRebirth">-1 Rebirth</button>
<button id="testBtn">TEST</button>
</div>

<div id="layout">

<div>
<canvas id="plane" width="500" height="500"></canvas>
<img id="gif" src="puk.gif">
</div>

<div id="rightPanel">

<div>Kąt: <span id="angleVal">0</span></div>
<div>Tryg: <span id="trygVal">0</span></div>
<div>Suma tryg: <span id="sumVal">0</span></div>
<div>Rebirthy: <span id="rebirthVal">0</span></div>
<div>Coins: <span id="coinVal">0</span></div>
<div>Tryg/s: <span id="autoVal">0</span></div>

<div>Rebirth progress</div>
<div class="progressBox">
<div id="rebirthBar" class="progressBar"></div>
</div>

<div>Level progress</div>
<div class="progressBox">
<div id="levelBar" class="progressBar"></div>
</div>

</div>
</div>

<div id="player"></div>
<div id="player2"></div>
<div id="player3"></div>
<div id="player4"></div>

<script>

let player1,player2,player3,player4
let activePlayer=null

let angle=0
let sumaTryg=0
let rebirths=0
let coins=0
let autoGain=0
let started=false

const canvas=document.getElementById("plane")
const ctx=canvas.getContext("2d")
const gif=document.getElementById("gif")

const centerX=canvas.width/2
const centerY=canvas.height/2
const radius=200

/* przyciski */

document.getElementById("startBtn").onclick=startGame
document.getElementById("pukBtn").onclick=puk
document.getElementById("buyBoost").onclick=buyBoost

document.getElementById("adminBtn").onclick=()=>{

document.getElementById("gameUI").style.display="none"
document.getElementById("adminUI").style.display="block"

}

document.getElementById("testBtn").onclick=()=>{

document.getElementById("adminUI").style.display="none"
document.getElementById("gameUI").style.display="block"
updateStage()

}

document.getElementById("addRebirth").onclick=()=>{

rebirths++
coins++
updateStage()
updateInfo()

}

document.getElementById("removeRebirth").onclick=()=>{

if(rebirths>0) rebirths--
updateStage()
updateInfo()

}

/* sekret admin */

let secret=""

document.addEventListener("keydown",e=>{

secret+=e.key.toUpperCase()

if(secret.includes("SKOLIM")){
document.getElementById("adminBtn").style.display="inline-block"
secret=""
}

})

/* youtube */

function loadYT(){

const tag=document.createElement("script")
tag.src="https://www.youtube.com/iframe_api"
document.body.appendChild(tag)

}

window.onYouTubeIframeAPIReady=function(){

player1=new YT.Player('player',{height:'0',width:'0',videoId:'8J1stp9AbOk',playerVars:{loop:1,playlist:'8J1stp9AbOk'}})
player2=new YT.Player('player2',{height:'0',width:'0',videoId:'-6KuSa0zgaA',playerVars:{loop:1,playlist:'-6KuSa0zgaA'}})
player3=new YT.Player('player3',{height:'0',width:'0',videoId:'8KD6sb88rMs',playerVars:{loop:1,playlist:'8KD6sb88rMs'}})
player4=new YT.Player('player4',{height:'0',width:'0',videoId:'1dBuX8HmUcQ',playerVars:{loop:1,playlist:'1dBuX8HmUcQ'}})

activePlayer=player1

}

/* start */

function startGame(){

if(!player1){
loadYT()
setTimeout(startGame,500)
return
}

player1.mute();player1.playVideo()
player2.mute();player2.playVideo()
player3.mute();player3.playVideo()
player4.mute();player4.playVideo()

setTimeout(()=>{

player1.unMute()
activePlayer=player1

},500)

started=true

}

/* gra */

function puk(){

if(!started) return

let tryg=Math.sin(angle)

if(rebirths>=10) tryg=Math.cos(angle)
if(rebirths>=20){
tryg=Math.tan(angle)
if(tryg>5) tryg=5
if(tryg<-5) tryg=-5
}
if(rebirths>=30) tryg=Math.sin(angle)

sumaTryg+=tryg

let threshold=100
if(rebirths>=10) threshold=200
if(rebirths>=20) threshold=300
if(rebirths>=30) threshold=400

if(sumaTryg>=threshold){
sumaTryg=0
rebirths++
coins++
}

updateStage()
updateInfo()

}

function buyBoost(){

if(coins>=1){
coins--
autoGain++
updateInfo()
}

}

/* muzyka */

function switchMusic(player){

if(activePlayer!==player){

activePlayer.mute()
player.unMute()
activePlayer=player

}

}

function updateStage(){

if(rebirths>=30){
gif.src="zabka.gif"
switchMusic(player4)
}
else if(rebirths>=20){
gif.src="rikitiki.gif"
switchMusic(player3)
}
else if(rebirths>=10){
gif.src="skirr.gif"
switchMusic(player2)
}
else{
gif.src="puk.gif"
switchMusic(player1)
}

}

/* animacja */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()
ctx.moveTo(0,centerY)
ctx.lineTo(canvas.width,centerY)

ctx.moveTo(centerX,0)
ctx.lineTo(centerX,canvas.height)

ctx.stroke()

ctx.beginPath()
ctx.arc(centerX,centerY,radius,0,Math.PI*2)
ctx.stroke()

let x=centerX+radius*Math.cos(angle)
let y=centerY-radius*Math.sin(angle)

ctx.beginPath()
ctx.moveTo(centerX,centerY)
ctx.lineTo(x,y)
ctx.stroke()

const rect=canvas.getBoundingClientRect()

gif.style.left=(rect.left+x-60)+"px"
gif.style.top=(rect.top+y-60)+"px"

}

function animate(){

angle+=0.02

if(angle>Math.PI*2){

angle=0

if(started){
sumaTryg+=autoGain
updateInfo()
}

}

draw()
requestAnimationFrame(animate)

}

function updateInfo(){

document.getElementById("angleVal").innerText=(angle*180/Math.PI).toFixed(1)
document.getElementById("trygVal").innerText=Math.sin(angle).toFixed(4)
document.getElementById("sumVal").innerText=sumaTryg.toFixed(2)
document.getElementById("rebirthVal").innerText=rebirths
document.getElementById("coinVal").innerText=coins
document.getElementById("autoVal").innerText=autoGain

let threshold=100
if(rebirths>=10) threshold=200
if(rebirths>=20) threshold=300
if(rebirths>=30) threshold=400

document.getElementById("rebirthBar").style.width=(sumaTryg/threshold*100)+"%"
document.getElementById("levelBar").style.width=((rebirths%10)/10*100)+"%"

if(activePlayer){

let volume=sumaTryg
if(volume>100) volume=100
if(volume<0) volume=0

activePlayer.setVolume(volume)

}

}

animate()

</script>

</body>
</html>
