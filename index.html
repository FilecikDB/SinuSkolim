<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sinus Skolim</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#eef2ff;
}

canvas{
background:white;
border:2px solid black;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#gif{
position:absolute;
width:150px;
pointer-events:none;
}

#shop{
margin-top:20px;
border-top:2px solid black;
padding-top:10px;
}
</style>
</head>

<body>

<h2>Sinus Skolim</h2>

<button id="startBtn">START</button>
<button id="pukBtn">PUK</button>

<canvas id="plane" width="500" height="500"></canvas>

<img id="gif" src="puk.gif">

<div id="info"></div>

<div id="shop">
<h3>Sklep</h3>
<button id="buyAuto">+1 sumy / sek (1 coin)</button>
</div>

<!-- PLAYER YOUTUBE -->
<div id="player" style="width:0;height:0;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let map = 1;

let angle = 0;
let sumSin = 0;
let rebirths = 0;
let coins = 0;
let autoGain = 0;

let started = false;

const canvas = document.getElementById("plane");
const ctx = canvas.getContext("2d");
const gif = document.getElementById("gif");

const centerX = 250;
const centerY = 250;
const radius = 200;

/* YOUTUBE PLAYER */

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:'8J1stp9AbOk',
playerVars:{
autoplay:0,
controls:0,
loop:1,
playlist:'8J1stp9AbOk'
}
});

}

/* START */

startBtn.onclick = function(){

if(player){
player.playVideo();
}

started = true;

};

/* ZMIANA MAPY */

function updateMap(){

if(rebirths >= 5 && map === 1){

map = 2;

gif.src = "skirr.gif";

player.loadVideoById({
videoId:"-6KuSa0zgaA",
loop:1,
playlist:"-6KuSa0zgaA"
});

}

}

/* GŁOŚNOŚĆ */

function updateVolume(){

if(!player) return;

let volume = sumSin;

if(volume < 0) volume = 0;
if(volume > 100) volume = 100;

player.setVolume(volume);

}

/* PUK */

pukBtn.onclick = function(){

if(!started) return;

let value;

if(map === 1){
value = Math.sin(angle);
}else{
value = Math.cos(angle);
}

sumSin += value;

checkRebirth();

updateVolume();

};

/* REBIRTH */

function checkRebirth(){

if(sumSin >= 100){

sumSin = 0;
rebirths++;
coins++;

updateMap();

}

}

/* SKLEP */

buyAuto.onclick = function(){

if(coins >= 1){

coins--;
autoGain++;

}

};

/* RYSOWANIE */

function draw(){

ctx.clearRect(0,0,500,500);

ctx.beginPath();
ctx.arc(centerX,centerY,radius,0,Math.PI*2);
ctx.stroke();

let x = centerX + radius*Math.cos(angle);
let y = centerY - radius*Math.sin(angle);

ctx.beginPath();
ctx.moveTo(centerX,centerY);
ctx.lineTo(x,y);
ctx.stroke();

const rect = canvas.getBoundingClientRect();

gif.style.left = (rect.left + x - 75) + "px";
gif.style.top = (rect.top + y - 75) + "px";

}

/* INFO */

function updateInfo(){

let trig;

if(map === 1){
trig = Math.sin(angle);
}else{
trig = Math.cos(angle);
}

info.innerHTML =
"Suma: "+sumSin.toFixed(2)+"<br>"+
"Trig: "+trig.toFixed(3)+"<br>"+
"Rebirthy: "+rebirths+"<br>"+
"Coins: "+coins+"<br>"+
"+/sek: "+autoGain+"<br>"+
"Mapa: "+map;

}

/* ANIMACJA */

function animate(){

angle += 0.02;

if(angle > Math.PI*2){
angle = 0;
}

draw();
updateInfo();

requestAnimationFrame(animate);

}

animate();

/* AUTO GAIN */

setInterval(function(){

sumSin += autoGain;

checkRebirth();
updateVolume();

},1000);

</script>

</body>
</html>
