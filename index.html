<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Trig Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2ff;
}

canvas{
background:white;
border:2px solid black;
}

button{
font-size:20px;
padding:10px 25px;
margin:10px;
cursor:pointer;
}

#info{
margin-top:20px;
font-size:20px;
}

#gif{
position:absolute;
width:150px;
pointer-events:none;
}

</style>
</head>
<body>

<h2>Kliknij PUK aby zapisać kąt</h2>

<button id="startBtn">START</button><br>
<button id="pukBtn">PUK</button>
<button id="buyBoost">Kup +1 / obrót (1 coin)</button>

<canvas id="plane" width="500" height="500"></canvas>

<img id="gif" src="puk.gif">

<div id="info"></div>

<div id="player"></div>
<div id="player2"></div>
<div id="player3"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player1
let player2
let player3
let activePlayer

function onYouTubeIframeAPIReady(){

player1=new YT.Player('player',{
height:'0',
width:'0',
videoId:'8J1stp9AbOk',
playerVars:{controls:0,loop:1,playlist:'8J1stp9AbOk'}
})

player2=new YT.Player('player2',{
height:'0',
width:'0',
videoId:'-6KuSa0zgaA',
playerVars:{controls:0,loop:1,playlist:'-6KuSa0zgaA'}
})

player3=new YT.Player('player3',{
height:'0',
width:'0',
videoId:'8KD6sb88rMs',
playerVars:{controls:0,loop:1,playlist:'8KD6sb88rMs'}
})

activePlayer=player1

}

const canvas=document.getElementById("plane")
const ctx=canvas.getContext("2d")
const gif=document.getElementById("gif")

const centerX=canvas.width/2
const centerY=canvas.height/2
const radius=200

let angle=0

let sumaTryg=0
let rebirths=0
let coins=0
let autoGain=0

let started=false

function updateVolume(){

let volume=sumaTryg

if(volume>100) volume=100
if(volume<0) volume=0

activePlayer.setVolume(volume)

}

startBtn.onclick=()=>{

player1.mute()
player1.playVideo()

player2.mute()
player2.playVideo()

player3.mute()
player3.playVideo()

setTimeout(()=>{
player1.unMute()
activePlayer=player1
updateVolume()
},500)

started=true

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()
ctx.moveTo(0,centerY)
ctx.lineTo(canvas.width,centerY)

ctx.moveTo(centerX,0)
ctx.lineTo(centerX,canvas.height)

ctx.stroke()

ctx.beginPath()
ctx.arc(centerX,centerY,radius,0,Math.PI*2)
ctx.stroke()

let x=centerX+radius*Math.cos(angle)
let y=centerY-radius*Math.sin(angle)

ctx.beginPath()
ctx.moveTo(centerX,centerY)
ctx.lineTo(x,y)
ctx.strokeStyle="blue"
ctx.lineWidth=3
ctx.stroke()

const rect=canvas.getBoundingClientRect()

gif.style.left=(rect.left+x-75)+"px"
gif.style.top=(rect.top+y-75)+"px"

}

function animate(){

angle+=0.02

if(angle>Math.PI*2){
angle=0

if(started){
sumaTryg+=autoGain
updateInfo()
updateVolume()
}

}

draw()

requestAnimationFrame(animate)

}

pukBtn.onclick=()=>{

if(!started) return

let deg=angle*180/Math.PI
let tryg

if(rebirths>=20){

tryg=Math.tan(angle)

if(tryg>5) tryg=5
if(tryg<-5) tryg=-5

}
else if(rebirths>=10){

tryg=Math.cos(angle)

}
else{

tryg=Math.sin(angle)

}

sumaTryg+=tryg

let threshold=100
if(rebirths>=10) threshold=200
if(rebirths>=20) threshold=400

if(sumaTryg>=threshold){
sumaTryg=0
rebirths++
coins++
}

updateStage()
updateVolume()
updateInfo(deg,tryg)

}

function updateStage(){

if(rebirths>=20){

gif.src="rikitiki.gif"

if(activePlayer!==player3){
activePlayer.mute()
player3.unMute()
activePlayer=player3
}

}
else if(rebirths>=10){

gif.src="skirr.gif"

if(activePlayer!==player2){
activePlayer.mute()
player2.unMute()
activePlayer=player2
}

}

}

buyBoost.onclick=()=>{

if(coins>=1){

coins--
autoGain++

updateInfo()

}

}

function updateInfo(deg=angle*180/Math.PI,tryg=Math.sin(angle)){

let threshold=100
if(rebirths>=10) threshold=200
if(rebirths>=20) threshold=400

info.innerHTML=
"Kąt: "+deg.toFixed(2)+"°<br>"+
"wartość funkcji: "+tryg.toFixed(4)+"<br>"+
"Suma tryg: "+sumaTryg.toFixed(4)+" / "+threshold+"<br>"+
"Odrodzenia: "+rebirths+"<br>"+
"Coins: "+coins+"<br>"+
"Auto gain: "+autoGain+"/obrót"

}

animate()

</script>

</body>
</html>
