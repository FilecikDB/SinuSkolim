<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sinus Game</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#eef2ff;
}

canvas{
background:white;
border:2px solid black;
}

button{
font-size:20px;
padding:10px 25px;
margin:10px;
cursor:pointer;
}

#info{
margin-top:20px;
font-size:20px;
}

#gif{
position:absolute;
width:150px;
pointer-events:none;
}

</style>

</head>
<body>

<h2>Kliknij PUK aby zapisać kąt</h2>

<button id="startBtn">START</button><br>
<button id="pukBtn">PUK</button>

<canvas id="plane" width="500" height="500"></canvas>

<img id="gif" src="puk.gif">

<div id="info">
Kąt: - <br>
sin(kąta): - <br>
Suma sinusów: 0 <br>
Odrodzenia: 0
</div>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'0',
width:'0',
videoId:'XMKh7Pif6Os',
playerVars:{
autoplay:0,
loop:1,
playlist:'XMKh7Pif6Os'
}
});

}

const canvas=document.getElementById("plane");
const ctx=canvas.getContext("2d");
const gif=document.getElementById("gif");

const centerX=canvas.width/2;
const centerY=canvas.height/2;
const radius=200;

let angle=0;
let sumSin=0;
let rebirths=0;
let started=false;

function updateVolume(){

let volume=sumSin;

if(volume<0) volume=0;
if(volume>100) volume=100;

if(player){
player.setVolume(volume);
}

}

document.getElementById("startBtn").onclick=()=>{

if(player){
player.playVideo();
}

updateVolume();
started=true;

};

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.moveTo(0,centerY);
ctx.lineTo(canvas.width,centerY);

ctx.moveTo(centerX,0);
ctx.lineTo(centerX,canvas.height);

ctx.stroke();

ctx.beginPath();
ctx.arc(centerX,centerY,radius,0,Math.PI*2);
ctx.stroke();

let x=centerX+radius*Math.cos(angle);
let y=centerY-radius*Math.sin(angle);

ctx.beginPath();
ctx.moveTo(centerX,centerY);
ctx.lineTo(x,y);
ctx.strokeStyle="blue";
ctx.lineWidth=3;
ctx.stroke();

const rect=canvas.getBoundingClientRect();

gif.style.left=(rect.left+x-75)+"px";
gif.style.top=(rect.top+y-75)+"px";

}

function animate(){

angle+=0.02;

if(angle>Math.PI*2){
angle=0;
}

draw();

requestAnimationFrame(animate);

}

document.getElementById("pukBtn").onclick=()=>{

if(!started) return;

let deg=angle*180/Math.PI;
let sin=Math.sin(angle);

sumSin+=sin;

if(sumSin>=100){

sumSin=0;
rebirths++;

}

updateVolume();

document.getElementById("info").innerHTML=
"Kąt: "+deg.toFixed(2)+"°<br>"+
"sin(kąta): "+sin.toFixed(4)+"<br>"+
"Suma sinusów: "+sumSin.toFixed(4)+"<br>"+
"Odrodzenia: "+rebirths;

};

animate();

</script>

</body>
</html>
